<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment App</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Canvas ────────────────────────────────────────────────────────── */
    body {
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      background: #d0d0d0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ── Phone frame ───────────────────────────────────────────────────── */
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      border-radius: 50px;
      border: 10px solid #1a1a1a;
      box-shadow:
        inset 0 0 0 1px #444,
        0 0 0 1px #111,
        0 30px 80px rgba(0,0,0,0.45);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      /* default background — updated by JS on navigation */
      background: linear-gradient(to bottom, #F4615C 0%, #ffffff 100%);
    }
    /* Volume buttons */
    .phone::before {
      content: ""; position: absolute;
      left: -14px; top: 110px;
      width: 4px; height: 32px;
      background: #111; border-radius: 2px 0 0 2px;
      box-shadow: 0 48px 0 #111, 0 96px 0 #111; z-index: 10;
    }
    /* Power button */
    .phone::after {
      content: ""; position: absolute;
      right: -14px; top: 150px;
      width: 4px; height: 64px;
      background: #111; border-radius: 0 2px 2px 0; z-index: 10;
    }

    /* ── Status bar (shared) ───────────────────────────────────────────── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 26px 4px;
      font-size: 13px; font-weight: 600; color: #1a1a1a;
      flex-shrink: 0;
    }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    /* ── Screen management ─────────────────────────────────────────────── */
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    /* ── Top nav bar ───────────────────────────────────────────────────── */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 20px 4px; flex-shrink: 0;
    }
    .btn-back {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid #1a1a1a; background: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; cursor: pointer; color: #1a1a1a;
    }
    .btn-back:hover { background: rgba(0,0,0,0.07); }
    .btn-menu {
      background: none; border: none;
      font-size: 26px; cursor: pointer; color: #1a1a1a; line-height: 1;
    }

    /* ── Shared content wrapper ────────────────────────────────────────── */
    .content {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 16px 24px 32px;
    }

    /* ── Typography ────────────────────────────────────────────────────── */
    .title-script {
      font-family: "Dancing Script", cursive;
      font-size: 44px; font-weight: 700; color: #1a1a1a; margin-bottom: 24px;
    }
    .title-plain {
      font-size: 22px; font-weight: 700; color: #1a1a1a;
      margin-bottom: 40px; letter-spacing: 0.2px;
    }

    /* ════════════════════════════════════════════════════════════════════ */
    /*  PROFILE SCREEN                                                     */
    /* ════════════════════════════════════════════════════════════════════ */
    .user-card {
      display: flex; align-items: center; gap: 18px;
      background: rgba(255, 215, 205, 0.55);
      border-radius: 20px; padding: 16px 20px;
      width: 100%; margin-bottom: 32px;
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid #1a1a1a;
      background: #c8956b;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; color: #fff;
      overflow: hidden;
    }
    .user-info p { font-size: 15px; color: #1a1a1a; line-height: 1.75; }
    .user-info p:first-child { font-weight: 600; }

    .action-btn {
      display: flex; align-items: center; gap: 16px;
      width: 100%; padding: 18px 24px; margin-bottom: 14px;
      background: #F4615C; border: 2.5px solid #1a1a1a; border-radius: 50px;
      font-size: 20px; font-weight: 600; color: #1a1a1a; cursor: pointer;
    }
    .action-btn:hover { filter: brightness(0.91); }

    /* ════════════════════════════════════════════════════════════════════ */
    /*  UPLOAD SCREEN                                                      */
    /* ════════════════════════════════════════════════════════════════════ */
    .upload-btn {
      display: flex; align-items: center; gap: 14px;
      width: 100%; padding: 16px 24px; margin-bottom: 14px;
      background: #C4C4C4; border: 2px solid #1a1a1a; border-radius: 50px;
      font-size: 18px; font-weight: 500; color: #1a1a1a; cursor: pointer;
    }
    .upload-btn:hover { filter: brightness(0.93); }

    .proceed-btn {
      width: 100%; padding: 20px; margin-top: auto;
      background: #3B6EF0; border: none; border-radius: 50px;
      font-size: 20px; font-weight: 700; color: #fff; cursor: pointer;
    }
    .proceed-btn:hover { filter: brightness(0.92); }

    /* ════════════════════════════════════════════════════════════════════ */
    /*  SETTINGS SCREEN                                                    */
    /* ════════════════════════════════════════════════════════════════════ */
    .tba { font-size: 18px; color: #444; margin-top: 60px; }

    /* ════════════════════════════════════════════════════════════════════ */
    /*  BLOOD SUGAR SCREENS                                                */
    /* ════════════════════════════════════════════════════════════════════ */
    .title-mono {
      font-size: 22px; font-weight: 700; color: #1a1a1a;
      margin-bottom: 14px; letter-spacing: 0.2px; align-self: flex-start;
    }
    /* scrollable content for embed screens */
    .content-embed {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 12px 16px 24px;
      overflow-y: auto;
    }
    .embed-frame {
      width: 100%; border: none; border-radius: 10px;
      background: rgba(255,255,255,0.25);
      margin-bottom: 14px; flex-shrink: 0;
    }
    /* Daily / Weekly / Monthly tab row */
    .tabs {
      display: flex; gap: 8px; width: 100%; margin-bottom: 14px; flex-shrink: 0;
    }
    .tab {
      flex: 1; padding: 10px 0; border-radius: 50px;
      border: 2px solid #1a1a1a; background: #C4C4C4;
      font-size: 14px; font-weight: 600; color: #1a1a1a; cursor: pointer;
    }
    .tab.active { background: #3B6EF0; color: #fff; border-color: #3B6EF0; }
    .tab:hover:not(.active) { filter: brightness(0.93); }
    /* Detailed information button */
    .detail-btn {
      width: 100%; padding: 18px; margin-top: auto; flex-shrink: 0;
      background: #3B6EF0; border: none; border-radius: 16px;
      font-size: 18px; font-weight: 700; color: #fff; cursor: pointer;
    }
    .detail-btn:hover { filter: brightness(0.92); }
  </style>
</head>
<body>
<div class="phone" id="phone">

  <!-- ── Status bar (always visible) ──────────────────────────────────── -->
  <div class="status-bar">
    <span id="time">09:41</span>
    <div class="status-icons">
      <!-- Signal -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0"  y="8"  width="3" height="4"  rx="0.5" fill="#1a1a1a"/>
        <rect x="4"  y="5"  width="3" height="7"  rx="0.5" fill="#1a1a1a"/>
        <rect x="8"  y="3"  width="3" height="9"  rx="0.5" fill="#1a1a1a"/>
        <rect x="12" y="0"  width="3" height="12" rx="0.5" fill="#1a1a1a"/>
      </svg>
      <!-- WiFi -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <circle cx="8" cy="11" r="1.3" fill="#1a1a1a"/>
        <path d="M4.5 7.4a4.9 4.9 0 0 1 7 0"
              stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M1.5 4.5a8.5 8.5 0 0 1 13 0"
              stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
      <!-- Battery -->
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x="0.5" y="0.5" width="21" height="12" rx="3" stroke="#1a1a1a"/>
        <rect x="2"   y="2"   width="16" height="9"  rx="2" fill="#1a1a1a"/>
        <path d="M23 4.5v4a2 2 0 0 0 0-4z" fill="#1a1a1a"/>
      </svg>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 1 — Profile                                               -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <div id="screen-profile" class="screen active">
    <div class="topbar">
      <button class="btn-back" onclick="goBack()">&#8592;</button>
      <button class="btn-menu">&#9776;</button>
    </div>
    <div class="content">
      <h1 class="title-script">Profile</h1>

      <div class="user-card">
        <div class="avatar">JD</div>
        <div class="user-info">
          <p>Jane Doe</p>
          <p>52 years old</p>
          <p>Type 1 diabetes</p>
        </div>
      </div>

      <button class="action-btn" onclick="navigate('screen-upload')">
        <!-- Bar chart icon -->
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <rect x="2"  y="13" width="5" height="8"  rx="1" fill="#1a1a1a"/>
          <rect x="9"  y="8"  width="5" height="13" rx="1" fill="#1a1a1a"/>
          <rect x="16" y="3"  width="5" height="18" rx="1" fill="#1a1a1a"/>
        </svg>
        View data
      </button>

      <button class="action-btn" onclick="navigate('screen-settings')">
        <!-- Gear icon -->
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
             stroke="#1a1a1a" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                   a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                   A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                   l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                   A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                   l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                   a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                   l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                   a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 2 — Upload data                                           -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <div id="screen-upload" class="screen">
    <div class="topbar">
      <button class="btn-back" onclick="goBack()">&#8592;</button>
      <button class="btn-menu">&#9776;</button>
    </div>
    <div class="content">
      <h2 class="title-plain">Upload data</h2>

      <button class="upload-btn">
        <!-- Upload arrow -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 16V4M8 8l4-4 4 4"/>
          <path d="M4 20h16"/>
        </svg>
        Upload file
      </button>

      <button class="upload-btn">
        <!-- QR icon -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3"  y="3"  width="7" height="7" rx="1"/>
          <rect x="14" y="3"  width="7" height="7" rx="1"/>
          <rect x="3"  y="14" width="7" height="7" rx="1"/>
          <path d="M14 14h2v2h-2zM18 14h3M14 18h3M18 18v3M21 14v3"/>
        </svg>
        Scan QR code
      </button>

      <button class="proceed-btn" onclick="navigate('screen-blood-calendar')">Proceed</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 3 — Settings                                              -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <div id="screen-settings" class="screen">
    <div class="topbar">
      <button class="btn-back" onclick="goBack()">&#8592;</button>
      <button class="btn-menu">&#9776;</button>
    </div>
    <div class="content">
      <h1 class="title-script">Settings</h1>
      <p class="tba">TBA</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 4 — Blood sugar: Calendar                                 -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <div id="screen-blood-calendar" class="screen">
    <div class="topbar">
      <button class="btn-back" onclick="goBack()">&#8592;</button>
      <button class="btn-menu">&#9776;</button>
    </div>
    <div class="content-embed">
      <h2 class="title-mono">Blood sugar</h2>
      <iframe
        class="embed-frame"
        height="460"
        src="https://observablehq.com/embed/@dtu/blood-glucose-project@332?cell=*&api_key=fa58c6bfbf2d68b6afb83b92bc47b985ec8bc55d"
        allowfullscreen>
      </iframe>
      <button class="detail-btn" onclick="navigate('screen-blood-scatter')">
        Detailed information
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 5 — Blood sugar: Scatter / Daily view                     -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <div id="screen-blood-scatter" class="screen">
    <div class="topbar">
      <button class="btn-back" onclick="goBack()">&#8592;</button>
      <button class="btn-menu">&#9776;</button>
    </div>
    <div class="content-embed">
      <h2 class="title-mono">Blood sugar</h2>
      <iframe
        class="embed-frame"
        height="340"
        src="https://observablehq.com/embed/@dtu/blood-glucose-project@332?cell=*&api_key=fa58c6bfbf2d68b6afb83b92bc47b985ec8bc55d"
        allowfullscreen>
      </iframe>
      <div class="tabs">
        <button class="tab active">Daily</button>
        <button class="tab" onclick="navigate('screen-blood-line')">Weekly</button>
        <button class="tab">Monthly</button>
      </div>
      <button class="detail-btn">Detailed information</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 6 — Blood sugar: Line / Weekly view                       -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <div id="screen-blood-line" class="screen">
    <div class="topbar">
      <button class="btn-back" onclick="goBack()">&#8592;</button>
      <button class="btn-menu">&#9776;</button>
    </div>
    <div class="content-embed">
      <h2 class="title-mono">Blood sugar</h2>
      <iframe
        class="embed-frame"
        height="340"
        src="https://observablehq.com/embed/@dtu/blood-glucose-project@332?cell=*&api_key=fa58c6bfbf2d68b6afb83b92bc47b985ec8bc55d"
        allowfullscreen>
      </iframe>
      <div class="tabs">
        <button class="tab" onclick="navigate('screen-blood-scatter')">Daily</button>
        <button class="tab active">Weekly</button>
        <button class="tab">Monthly</button>
      </div>
      <button class="detail-btn">Detailed information</button>
    </div>
  </div>

</div><!-- end .phone -->

<script>
  // ── Router ────────────────────────────────────────────────────────────
  const BACKGROUNDS = {
    'screen-profile':       'linear-gradient(to bottom, #F4615C 0%, #ffffff 100%)',
    'screen-upload':        'linear-gradient(to bottom, #F4615C 0%, #ffffff 100%)',
    'screen-settings':      'linear-gradient(to bottom, #F4615C 0%, #ffffff 100%)',
    'screen-blood-calendar':'linear-gradient(to bottom, #F4615C 0%, #ffffff 100%)',
    'screen-blood-scatter': 'linear-gradient(to bottom, #F4615C 0%, #ffffff 100%)',
    'screen-blood-line':    'linear-gradient(to bottom, #F4615C 0%, #ffffff 100%)',
  };

  const navStack = ['screen-profile'];
  const phone = document.getElementById('phone');

  function navigate(screenId) {
    document.querySelector('.screen.active').classList.remove('active');
    document.getElementById(screenId).classList.add('active');
    navStack.push(screenId);
    phone.style.background = BACKGROUNDS[screenId];
  }

  function goBack() {
    if (navStack.length > 1) {
      navStack.pop();
      document.querySelector('.screen.active').classList.remove('active');
      const prev = navStack[navStack.length - 1];
      document.getElementById(prev).classList.add('active');
      phone.style.background = BACKGROUNDS[prev];
    }
  }

  // ── Live clock ────────────────────────────────────────────────────────
  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('time').textContent = h + ':' + m;
  }
  tick();
  setInterval(tick, 10000);
</script>
</body>
</html>
